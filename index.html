<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dan Sucks Fart Button</title>
    <style>
      :root {
        --bg: #f6f1d8;
        --panel: #ffffff;
        --accent: #2f855a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Trebuchet MS", "Comic Sans MS", "Arial", sans-serif;
        background: radial-gradient(circle at top, #ffe7a8 0%, var(--bg) 50%, #e8d7a8 100%);
        color: #1f2937;
      }

      .card {
        width: min(720px, 92vw);
        text-align: center;
        background: var(--panel);
        border-radius: 14px;
        padding: 2rem;
        border: 3px solid #2c2c2c;
        box-shadow: 10px 10px 0 #d0c08f;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 4rem);
        letter-spacing: 0.02em;
      }

      p {
        margin: 1rem 0 1.5rem;
        color: #444;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 0.9rem 1.5rem;
        font-size: 1.1rem;
        font-weight: 700;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        transition: transform 0.12s ease;
      }

      button:hover {
        transform: scale(1.03);
      }

      button:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Dan sucks!</h1>
      <p>Click the button for a local fart-style blast.</p>
      <button id="fart-button" type="button">Play Fart</button>
    </main>

    <script>
      const button = document.getElementById("fart-button");
      const WebAudioContext = window.AudioContext || window.webkitAudioContext;
      let audioContext = null;

      function getAudioContext() {
        if (!WebAudioContext) {
          return null;
        }
        if (!audioContext) {
          audioContext = new WebAudioContext();
        }
        return audioContext;
      }

      function createFartNoiseBuffer(ctx, durationSeconds) {
        const frameCount = Math.floor(ctx.sampleRate * durationSeconds);
        const buffer = ctx.createBuffer(1, frameCount, ctx.sampleRate);
        const channel = buffer.getChannelData(0);
        let wobble = 0;

        for (let i = 0; i < frameCount; i += 1) {
          const progress = i / frameCount;
          const decay = Math.pow(1 - progress, 1.8);
          const sputter = Math.sin(progress * Math.PI * 38) > 0.22 ? 1 : 0.38;
          wobble = wobble * 0.82 + (Math.random() * 2 - 1) * 0.18;
          channel[i] = (Math.random() * 2 - 1 + wobble) * 0.95 * decay * sputter;
        }

        return buffer;
      }

      function makeSaturationCurve(amount = 28) {
        const samples = 1024;
        const curve = new Float32Array(samples);
        for (let i = 0; i < samples; i += 1) {
          const x = (i * 2) / samples - 1;
          curve[i] = ((3 + amount) * x * 20 * (Math.PI / 180)) / (Math.PI + amount * Math.abs(x));
        }
        return curve;
      }

      function scheduleBubble(ctx, destination, startTime, pitch, duration, gainValue) {
        const bubble = ctx.createOscillator();
        const bubbleGain = ctx.createGain();
        bubble.type = "sawtooth";
        bubble.frequency.setValueAtTime(pitch, startTime);
        bubble.frequency.exponentialRampToValueAtTime(Math.max(35, pitch * 0.42), startTime + duration);
        bubbleGain.gain.setValueAtTime(0.001, startTime);
        bubbleGain.gain.exponentialRampToValueAtTime(gainValue, startTime + 0.025);
        bubbleGain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
        bubble.connect(bubbleGain).connect(destination);
        bubble.start(startTime);
        bubble.stop(startTime + duration + 0.03);
        bubble.onended = () => {
          bubble.disconnect();
          bubbleGain.disconnect();
        };
      }

      function playFartSound(ctx) {
        const now = ctx.currentTime;
        const burstDuration = 1.9;

        const wetBus = ctx.createGain();
        wetBus.gain.value = 0.95;

        const squelch = ctx.createWaveShaper();
        squelch.curve = makeSaturationCurve(34);
        squelch.oversample = "4x";

        const wetLowpass = ctx.createBiquadFilter();
        wetLowpass.type = "lowpass";
        wetLowpass.frequency.setValueAtTime(720, now);
        wetLowpass.frequency.exponentialRampToValueAtTime(165, now + burstDuration);
        wetLowpass.Q.setValueAtTime(5.2, now);

        const wetCompressor = ctx.createDynamicsCompressor();
        wetCompressor.threshold.setValueAtTime(-22, now);
        wetCompressor.knee.setValueAtTime(24, now);
        wetCompressor.ratio.setValueAtTime(7, now);
        wetCompressor.attack.setValueAtTime(0.004, now);
        wetCompressor.release.setValueAtTime(0.24, now);

        const masterGain = ctx.createGain();
        masterGain.gain.setValueAtTime(0.001, now);
        masterGain.gain.exponentialRampToValueAtTime(0.96, now + 0.04);
        masterGain.gain.exponentialRampToValueAtTime(0.001, now + burstDuration + 0.35);

        wetBus.connect(squelch).connect(wetLowpass).connect(wetCompressor).connect(masterGain).connect(ctx.destination);

        const noise = ctx.createBufferSource();
        noise.buffer = createFartNoiseBuffer(ctx, 2.4);
        const noiseFilter = ctx.createBiquadFilter();
        noiseFilter.type = "bandpass";
        noiseFilter.frequency.setValueAtTime(520, now);
        noiseFilter.frequency.exponentialRampToValueAtTime(115, now + burstDuration);
        noiseFilter.Q.setValueAtTime(2.9, now);

        const noiseGain = ctx.createGain();
        noiseGain.gain.setValueAtTime(0.001, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.62, now + 0.045);
        noiseGain.gain.setValueAtTime(0.5, now + 0.32);
        noiseGain.gain.exponentialRampToValueAtTime(0.05, now + burstDuration + 0.12);

        const rumble = ctx.createOscillator();
        rumble.type = "sawtooth";
        rumble.frequency.setValueAtTime(115, now);
        rumble.frequency.exponentialRampToValueAtTime(52, now + burstDuration + 0.15);

        const rumbleGain = ctx.createGain();
        rumbleGain.gain.setValueAtTime(0.001, now);
        rumbleGain.gain.exponentialRampToValueAtTime(0.36, now + 0.08);
        rumbleGain.gain.exponentialRampToValueAtTime(0.001, now + burstDuration + 0.28);

        const throat = ctx.createOscillator();
        throat.type = "triangle";
        throat.frequency.setValueAtTime(82, now);
        throat.frequency.exponentialRampToValueAtTime(45, now + burstDuration);

        const throatGain = ctx.createGain();
        throatGain.gain.setValueAtTime(0.001, now);
        throatGain.gain.exponentialRampToValueAtTime(0.23, now + 0.12);
        throatGain.gain.exponentialRampToValueAtTime(0.001, now + burstDuration + 0.18);

        noise.connect(noiseFilter).connect(noiseGain).connect(wetBus);
        rumble.connect(rumbleGain).connect(wetBus);
        throat.connect(throatGain).connect(wetBus);

        [0.16, 0.34, 0.58, 0.82, 1.12, 1.42].forEach((offset, index) => {
          scheduleBubble(ctx, wetBus, now + offset, 175 - index * 16, 0.16 + index * 0.018, 0.11 - index * 0.009);
        });

        noise.start(now);
        rumble.start(now);
        throat.start(now + 0.03);
        const stopAt = now + burstDuration + 0.35;
        noise.stop(stopAt);
        rumble.stop(stopAt);
        throat.stop(stopAt);

        let cleaned = false;
        const cleanupNodes = () => {
          if (cleaned) return;
          cleaned = true;
          wetBus.disconnect();
          squelch.disconnect();
          wetLowpass.disconnect();
          wetCompressor.disconnect();
          masterGain.disconnect();
          noiseGain.disconnect();
          noiseFilter.disconnect();
          noise.disconnect();
          rumbleGain.disconnect();
          rumble.disconnect();
          throatGain.disconnect();
          throat.disconnect();
        };

        noise.onended = cleanupNodes;
      }

      button.addEventListener("click", async () => {
        const ctx = getAudioContext();
        if (!ctx) {
          return;
        }

        if (ctx.state === "suspended") {
          await ctx.resume();
        }
        playFartSound(ctx);
      });
    </script>
  </body>
</html>
