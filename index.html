<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dan Sucks Fart Button</title>
    <style>
      :root {
        --bg: #f6f1d8;
        --panel: #ffffff;
        --accent: #2f855a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Trebuchet MS", "Comic Sans MS", "Arial", sans-serif;
        background: radial-gradient(circle at top, #ffe7a8 0%, var(--bg) 50%, #e8d7a8 100%);
        color: #1f2937;
      }

      .card {
        width: min(720px, 92vw);
        text-align: center;
        background: var(--panel);
        border-radius: 14px;
        padding: 2rem;
        border: 3px solid #2c2c2c;
        box-shadow: 10px 10px 0 #d0c08f;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 4rem);
        letter-spacing: 0.02em;
      }

      p {
        margin: 1rem 0 1.5rem;
        color: #444;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 0.9rem 1.5rem;
        font-size: 1.1rem;
        font-weight: 700;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        transition: transform 0.12s ease;
      }

      button:hover {
        transform: scale(1.03);
      }

      button:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Dan sucks!</h1>
      <p>Click the button for a local fart-style blast.</p>
      <button id="fart-button" type="button">Play Fart</button>
    </main>

    <script>
      const button = document.getElementById("fart-button");
      const WebAudioContext = window.AudioContext || window.webkitAudioContext;
      let audioContext = null;

      function getAudioContext() {
        if (!WebAudioContext) {
          return null;
        }
        if (!audioContext) {
          audioContext = new WebAudioContext();
        }
        return audioContext;
      }

      function createFartNoiseBuffer(ctx, durationSeconds) {
        const frameCount = Math.floor(ctx.sampleRate * durationSeconds);
        const buffer = ctx.createBuffer(1, frameCount, ctx.sampleRate);
        const channel = buffer.getChannelData(0);

        for (let i = 0; i < frameCount; i += 1) {
          const fade = 1 - i / frameCount;
          channel[i] = (Math.random() * 2 - 1) * 0.8 * fade;
        }

        return buffer;
      }

      function playFartSound(ctx) {
        const now = ctx.currentTime;
        const burstDuration = 1.25;

        const noise = ctx.createBufferSource();
        noise.buffer = createFartNoiseBuffer(ctx, 2);
        const noiseFilter = ctx.createBiquadFilter();
        noiseFilter.type = "bandpass";
        noiseFilter.frequency.setValueAtTime(420, now);
        noiseFilter.frequency.exponentialRampToValueAtTime(120, now + burstDuration);
        noiseFilter.Q.setValueAtTime(1.8, now);

        const noiseGain = ctx.createGain();
        noiseGain.gain.setValueAtTime(0.001, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.45, now + 0.05);
        noiseGain.gain.exponentialRampToValueAtTime(0.04, now + burstDuration);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, now + burstDuration + 0.2);

        const tone = ctx.createOscillator();
        tone.type = "triangle";
        tone.frequency.setValueAtTime(160, now);
        tone.frequency.exponentialRampToValueAtTime(95, now + burstDuration);

        const toneGain = ctx.createGain();
        toneGain.gain.setValueAtTime(0.001, now);
        toneGain.gain.exponentialRampToValueAtTime(0.28, now + 0.07);
        toneGain.gain.exponentialRampToValueAtTime(0.001, now + burstDuration + 0.2);

        const masterGain = ctx.createGain();
        masterGain.gain.value = 0.9;

        noise.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        noiseGain.connect(masterGain);
        tone.connect(toneGain);
        toneGain.connect(masterGain);
        masterGain.connect(ctx.destination);

        noise.start(now);
        tone.start(now);
        const stopAt = now + burstDuration + 0.25;
        noise.stop(stopAt);
        tone.stop(stopAt);

        let cleaned = false;
        const cleanupNodes = () => {
          if (cleaned) return;
          cleaned = true;
          masterGain.disconnect();
          toneGain.disconnect();
          tone.disconnect();
          noiseGain.disconnect();
          noiseFilter.disconnect();
          noise.disconnect();
        };

        noise.onended = cleanupNodes;
        tone.onended = cleanupNodes;
      }

      button.addEventListener("click", async () => {
        const ctx = getAudioContext();
        if (!ctx) {
          return;
        }

        if (ctx.state === "suspended") {
          await ctx.resume();
        }
        playFartSound(ctx);
      });
    </script>
  </body>
</html>
